[build]
  publish = "client"
  functions = "functions"
  command = "pip install -r requirements.txt"

[functions]
  included_files = ["server/fonts/**", "server/app.py", "server/school.db"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/app"
  status = 200



[build.environment]
  PYTHON_VERSION = "3.10"
