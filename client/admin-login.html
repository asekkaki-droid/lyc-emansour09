<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المدير | مؤسسة الثانوية الاعدادية المنصور بمكناس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-accent));
            font-family: 'Cairo', sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 { margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-login:hover { background: var(--primary-accent); }
        .forgot-pass { margin-top: 15px; display: block; color: var(--primary-accent); font-size: 0.9rem; text-decoration: none; cursor: pointer; }
        
        /* Modal for Forgot Password */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <i class="fas fa-user-shield fa-3x" style="color: var(--primary-dark); margin-bottom: 20px;"></i>
        <h2>دخول المدير</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" required placeholder="admin@almansour.ma">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">دخول</button>
        </form>
        <span class="forgot-pass" id="forgotBtn">نسيت كلمة المرور؟</span>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal" id="forgotModal">
        <div class="modal-content">
            <h3>استرجاع كلمة المرور</h3>
            <p style="margin: 15px 0; color: var(--text-muted);">أدخل بريد المؤسسة الرسمي لإرسال رابط الاسترجاع.</p>
            <div class="form-group">
                <input type="email" id="recoveryEmail" placeholder="lyceealmansour282@gmail.com">
            </div>
            <button class="btn-login" id="sendRecovery">إرسال</button>
            <button class="btn-login" style="background: #ccc; margin-top: 10px;" onclick="document.getElementById('forgotModal').style.display='none'">إلغاء</button>
            <div id="modalStatus" style="margin-top: 15px; font-weight: bold; font-size: 0.9rem;"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:5000' : '';
        
        const statusDiv = document.createElement('div');
        statusDiv.id = 'loginStatus';
        document.getElementById('loginForm').after(statusDiv);

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('loginStatus');

            status.innerHTML = '<div style="padding: 10px; background: #ebf8ff; color: #2b6cb0; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: center;"><i class="fas fa-spinner fa-spin"></i> جاري التحقق...</div>';

            const endpoints = [`${API_BASE}/api/admin/login`, `${API_BASE}/admin/login`].filter((v, i, a) => a.indexOf(v) === i);
            let lastError = null;

            for (const url of endpoints) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    
                    if (res.ok) {
                        localStorage.setItem('adminToken', data.token);
                        status.innerHTML = '<div style="padding: 10px; background: #c6f6d5; color: #22543d; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: center;">✅ تم تسجيل الدخول بنجاح! جاري التحويل...</div>';
                        setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
                        return;
                    } else if (res.status === 404) {
                        continue;
                    } else {
                        status.innerHTML = `<div style="padding: 10px; background: #fff5f5; color: #c53030; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: center;">❌ ${data.message || 'البريد الإلكتروني أو كلمة المرور غير صحيحة'}</div>`;
                        return;
                    }
                } catch (err) {
                    lastError = err;
                }
            }

            status.innerHTML = `<div style="padding: 10px; background: #fff5f5; color: #c53030; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: center;">❌ فشل الاتصال بالسيرفر. (${lastError?.message || 'Unknown'})</div>`;
        };

        // Forgot Pass Logic
        const modal = document.getElementById('forgotModal');
        document.getElementById('forgotBtn').onclick = () => modal.style.display = 'flex';
        
        document.getElementById('sendRecovery').onclick = async () => {
            const email = document.getElementById('recoveryEmail').value;
            const mStatus = document.getElementById('modalStatus');
            if (!email) {
                if (mStatus) mStatus.innerHTML = '<span style="color: #c53030;">❌ يرجى إدخال البريد الإلكتروني</span>';
                return; 
            }

            if (mStatus) mStatus.innerHTML = '<span style="color: #2b6cb0;"><i class="fas fa-spinner fa-spin"></i> جاري الإرسال...</span>';

            const endpoints = [`${API_BASE}/api/admin/forgot-password`, `${API_BASE}/admin/forgot-password`.replace('/api', '')].filter((v, i, a) => a.indexOf(v) === i);
            let lastError = null;

            for (const url of endpoints) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (res.ok) {
                        if (mStatus) mStatus.innerHTML = `<span style="color: #22543d;">✅ ${data.message}</span>`;
                        setTimeout(() => {
                            modal.style.display = 'none';
                            if (mStatus) mStatus.innerHTML = '';
                        }, 3000);
                        return;
                    } else if (res.status === 404) {
                        continue;
                    } else {
                        if (mStatus) mStatus.innerHTML = `<span style="color: #c53030;">❌ ${data.message || 'فشل الطلب'}</span>`;
                        return;
                    }
                } catch (err) {
                    lastError = err;
                }
            }
            if (mStatus) mStatus.innerHTML = `<span style="color: #c53030;">❌ فشل الاتصال: ${lastError?.message || 'Unknown Error'}</span>`;
        };
    </script>
</body>
</html>
