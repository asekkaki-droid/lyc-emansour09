<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التفاصيل | مؤسسة الثانوية الاعدادية المنصور بمكناس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .details-container { padding: 80px 0; min-height: 80vh; }
        .details-header { text-align: center; margin-bottom: 40px; }
        .details-header h1 { color: var(--primary-dark); font-size: 2.5rem; }
        .details-meta { color: var(--text-muted); margin-top: 10px; }
        
        .main-gallery { margin-bottom: 40px; }
        .gallery-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        }
        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        .gallery-item img:hover { transform: scale(1.02); }
        
        /* Layout logic for single image */
        .single-image-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .single-image-layout .content-text { flex: 1; min-width: 300px; }
        .single-image-layout .content-img { flex: 1; min-width: 300px; }
        .single-image-layout img { width: 100%; border-radius: 20px; box-shadow: var(--shadow); }

        .content-full {
            line-height: 1.8;
            font-size: 1.1rem;
            color: var(--text-main);
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <i class="fas fa-school"></i>
                <span>مؤسسة الثانوية الاعدادية المنصور بمكناس</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="about.html">عن المؤسسة</a></li>
                <li><a href="announcements.html">الإعلانات</a></li>
                <li><a href="activities.html">الأنشطة</a></li>
                <li><a href="gallery.html">المعرض</a></li>
                <li><a href="contact.html">تواصل معنا</a></li>
            </ul>
        </div>
    </nav>

    <div class="container details-container" id="details-view">
        <div style="text-align: center; padding: 50px;">
            <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary-accent);"></i>
            <p>جاري تحميل التفاصيل...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-about">
                    <h3>مؤسسة الثانوية الاعدادية المنصور بمكناس</h3>
                    <p>المؤسسة التربوية الرائدة في تقديم تعليم متميز وبناء أجيال الغد بمكناس.</p>
                </div>
                <!-- ... other footer parts ... -->
            </div>
        </div>
    </footer>

    <script>
        async function loadDetails() {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type'); // 'announcement' or 'activity'
            const id = params.get('id');
            const container = document.getElementById('details-view');

            if (!type || !id) {
                container.innerHTML = "<h2>عذراً، الرابط غير صالح</h2>";
                return;
            }

            try {
                const endpoint = type === 'announcement' ? `/api/announcements/${id}` : `/api/activities/${id}`;
                const res = await fetch(endpoint);
                if (!res.ok) throw new Error();
                const data = await res.json();

                const images = data.image_url ? data.image_url.split(',').filter(url => url.trim() !== '') : [];
                
                let html = `
                    <div class="details-header">
                        <h1>${data.title}</h1>
                        <div class="details-meta">
                            <i class="far fa-calendar-alt"></i> ${new Date(data.created_at).toLocaleDateString('ar-MA')}
                        </div>
                    </div>
                `;

                if (images.length === 1) {
                    html += `
                        <div class="single-image-layout">
                            <div class="content-img">
                                <img src="${images[0]}" alt="${data.title}">
                            </div>
                            <div class="content-text">
                                <div class="content-full">${data.content}</div>
                            </div>
                        </div>
                    `;
                } else if (images.length > 1) {
                    html += `
                        <div class="gallery-grid" style="margin-bottom: 40px;">
                            ${images.map(img => `
                                <div class="gallery-item">
                                    <img src="${img}" alt="${data.title}">
                                </div>
                            `).join('')}
                        </div>
                        <div class="content-full">${data.content}</div>
                    `;
                } else {
                    html += `<div class="content-full">${data.content}</div>`;
                }

                container.innerHTML = html;
                document.title = `${data.title} | مؤسسة الثانوية الاعدادية المنصور بمكناس`;

            } catch (err) {
                container.innerHTML = "<h2>عذراً، حدث خطأ أثناء تحميل البيانات</h2>";
            }
        }

        window.onload = loadDetails;
    </script>
</body>
</html>
