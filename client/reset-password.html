<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة | ثانوية المنصور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-accent));
            font-family: 'Cairo', sans-serif;
        }
        .reset-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .reset-card h2 { margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            background: #f9f9f9;
        }
        .form-group input[readonly] { background: #eee; cursor: not-allowed; }
        .btn-reset {
            width: 100%;
            padding: 14px;
            background: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-reset:hover { background: var(--primary-accent); }
    </style>
</head>
<body>
    <div class="reset-card">
        <i class="fas fa-key fa-3x" style="color: var(--primary-dark); margin-bottom: 20px;"></i>
        <h2>تعيين كلمة المرور</h2>
        <p style="margin-bottom: 30px; color: var(--text-muted);">يرجى اختيار كلمة مرور قوية وجديدة.</p>
        
        <form id="resetForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" readonly required>
            </div>
            <div class="form-group">
                <label>كلمة المرور الجديدة</label>
                <input type="password" id="new_password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>تأكيد كلمة المرور</label>
                <input type="password" id="confirm_password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-reset">تحديث كلمة المرور</button>
        </form>
        <div id="statusMsg" style="margin-top: 20px;"></div>
    </div>

    <script>
        const API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:5000' : '';
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const token = urlParams.get('token');

        if (!email || !token) {
            document.addEventListener('DOMContentLoaded', () => {
                const status = document.getElementById('statusMsg');
                if (status) status.innerHTML = '<div style="padding: 15px; background: #fff5f5; color: #c53030; border-radius: 8px; font-weight: bold; text-align: center; border: 1px solid #feb2b2;">❌ الرابط غير صالح أو ناقص. يرجى طلب رابط جديد.</div>';
            });
            setTimeout(() => window.location.href = 'admin-login.html', 5000);
        }

        document.getElementById('email').value = email;

        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            const new_pass = document.getElementById('new_password').value;
            const confirm_pass = document.getElementById('confirm_password').value;
            const status = document.getElementById('statusMsg');

            if (new_pass !== confirm_pass) {
                status.innerHTML = '<div style="padding: 10px; background: #fff5f5; color: #c53030; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: center;">❌ كلمات المرور غير متطابقة</div>';
                return;
            }

            status.innerHTML = '<div style="padding: 10px; background: #ebf8ff; color: #2b6cb0; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: center;"><i class="fas fa-spinner fa-spin"></i> جاري التحديث...</div>';

            const endpoints = [`${API_BASE}/api/admin/reset-password`, `${API_BASE}/admin/reset-password`].filter((v, i, a) => a.indexOf(v) === i);
            let lastError = null;

            for (const url of endpoints) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: email,
                            token: token,
                            new_password: new_pass
                        })
                    });
                    
                    if (res.ok) {
                        const result = await res.json();
                        status.innerHTML = `<div style="padding: 10px; background: #c6f6d5; color: #22543d; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: center;">✅ ${result.message} سيتم توجيهك لصفحة الدخول...</div>`;
                        setTimeout(() => window.location.href = 'admin-login.html', 3000);
                        return;
                    } else if (res.status === 404) {
                        continue;
                    } else {
                        const result = await res.json().catch(() => ({}));
                        status.innerHTML = `<div style="padding: 10px; background: #fff5f5; color: #c53030; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: center;">❌ خطأ: ${result.message || 'فشل التحديث'}</div>`;
                        return;
                    }
                } catch (err) {
                    lastError = err;
                }
            }
            status.innerHTML = `<div style="padding: 10px; background: #fff5f5; color: #c53030; border-radius: 8px; margin-top: 15px; font-weight: bold; text-align: center;">❌ فشل الاتصال بالسيرفر. (${lastError?.message || 'Unknown Error'})</div>`;
        };
    </script>
</body>
</html>
